<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats – OCC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="stats">

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <svg viewBox="0 0 36 36" fill="none">
        <rect x="11" y="8" width="2.5" height="18" rx="1.2" fill="white" opacity=".9"/>
        <rect x="16.75" y="5" width="2.5" height="21" rx="1.2" fill="white"/>
        <rect x="22.5" y="8" width="2.5" height="18" rx="1.2" fill="white" opacity=".9"/>
        <circle cx="28" cy="9" r="5.5" fill="#e8820c" opacity=".9"/>
        <circle cx="28" cy="9" r="3.2" fill="#f5a73b"/>
        <path d="M25 6Q27.5 3 31.5 5.5Q29 9 25.5 8.5Z" fill="#f97316" opacity=".8"/>
      </svg>
      <div class="nav-logo-text">OCC <em class="year-display nav-year">2025</em></div>
    </a>
    <div class="nav-links">
      <a class="nav-link" data-nav="home"     href="index.html">Home</a>
      <a class="nav-link" data-nav="schedule" href="schedule.html">Schedule</a>
      <a class="nav-link" data-nav="teams"    href="teams.html">Teams</a>
      <a class="nav-link" data-nav="points"   href="points.html">Standings</a>
      <a class="nav-link" data-nav="stats"    href="stats.html">Stats</a>
      <a class="nav-link" data-nav="awards"   href="awards.html">Awards</a>
    </div>
    <div class="nav-right">
      <select class="year-select"></select>
      <a class="yt-link" href="https://www.youtube.com/@OCCNoida" target="_blank" rel="noopener" title="OCC YouTube Channel">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.6 2.8 12 2.8 12 2.8s-4.6 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.2.3 4.2s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.5 21.7 12 21.7 12 21.7s4.6 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.2v-2C23.3 9.1 23 7 23 7z" fill="#FF0000"/>
          <path d="M9.7 15.5V8.5l6.6 3.5-6.6 3.5z" fill="white"/>
        </svg>
      </a>
    </div>
  </nav>

  <div class="hero" style="padding:36px 24px 28px">
    <div class="hero-eyebrow">Player Statistics</div>
    <h1 style="font-size:clamp(32px,5vw,52px)">STATS &<br><em>LEADERBOARDS</em></h1>
    <p class="hero-sub">Batting · Bowling · Fielding · MVP</p>
  </div>
  <div class="hero-divider"></div>

  <div class="page-section active" data-page="stats">
    <div class="container">
      <div class="section">
        <div class="section-header">
          <div class="section-title">Player Statistics</div>
          <div class="section-badge" id="stats-badge">2025</div>
        </div>
        <div class="tabs" id="stats-tabs">
          <button class="tab active" data-tab="batting"  onclick="switchStatTab('batting')">Batting</button>
          <button class="tab"        data-tab="bowling"  onclick="switchStatTab('bowling')">Bowling</button>
          <button class="tab"        data-tab="fielding" onclick="switchStatTab('fielding')">Fielding</button>
          <button class="tab"        data-tab="mvp"      onclick="switchStatTab('mvp')">MVP</button>
        </div>
        <div id="stats-content">
          <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
