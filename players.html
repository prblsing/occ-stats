<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players — OCC Cricket</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏏</text></svg>" />
</head>
<body>

<div class="page-banner">
  <div class="banner-inner">
    <div class="banner-text">
      <div class="eyebrow">OCC Cricket</div>
      <h1>Player <span>Stats</span></h1>
      <div class="sub" id="banner-sub">Batting · Bowling · Fielding</div>
    </div>
    <span class="season-badge" id="season-badge"></span>
  </div>
</div>

<div class="page-wrap">
  <div id="year-bar-mount"></div>

  <!-- Cap leaders -->
  <div id="caps-section"></div>

  <!-- Tabs: Batting / Bowling / Fielding -->
  <div class="tab-bar mt-lg" id="stats-tabs">
    <button class="tab-btn active" data-tab="batting">🏏 Batting</button>
    <button class="tab-btn" data-tab="bowling">⚡ Bowling</button>
    <button class="tab-btn" data-tab="fielding">🧤 Fielding</button>
  </div>

  <!-- Filters row -->
  <div class="filter-bar" id="filter-bar">
    <div class="search-box">
      <span style="color:var(--text-3)">🔍</span>
      <input type="text" id="player-search" placeholder="Search player…" />
    </div>
    <!-- Team pills injected here -->
  </div>

  <!-- Tables (toggled by tab) -->
  <div id="batting-section"  class="fade-in"></div>
  <div id="bowling-section"  class="fade-in" style="display:none"></div>
  <div id="fielding-section" class="fade-in" style="display:none"></div>

  <!-- All players summary (always shown at bottom) -->
  <div class="section-head mt-lg">
    <h2>👤 All Players</h2>
    <div class="rule"></div>
  </div>
  <div class="grid-auto-sm" id="player-cards"></div>

</div>

<script src="js/occ.js"></script>
<script src="js/chrome.js"></script>
<script>
(async () => {
  let activeTab  = 'batting';
  let activeTeam = 'all';
  let searchTerm = '';
  let currentData = null;

  const year = await injectChrome();
  const mount = document.getElementById('year-bar-mount');
  mount.appendChild(buildYearBar(OCC.getSeasons(), year, (y, d) => { currentData = d; renderAll(); }));
  currentData = OCC.getData();
  renderAll();
  OCC.onYearChange((y, d) => {
    currentData = d;
    mount.innerHTML = '';
    mount.appendChild(buildYearBar(OCC.getSeasons(), y, (ny, nd) => { currentData = nd; renderAll(); }));
    renderAll();
  });

  // Tabs
  document.getElementById('stats-tabs').addEventListener('click', e => {
    if (!e.target.classList.contains('tab-btn')) return;
    document.querySelectorAll('#stats-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeTab = e.target.dataset.tab;
    showTab(activeTab);
  });

  // Search
  document.getElementById('player-search').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    renderTables();
    renderCards();
  });

  function showTab(tab) {
    document.getElementById('batting-section').style.display  = tab === 'batting'  ? 'block' : 'none';
    document.getElementById('bowling-section').style.display  = tab === 'bowling'  ? 'block' : 'none';
    document.getElementById('fielding-section').style.display = tab === 'fielding' ? 'block' : 'none';
  }

  function filteredPlayers() {
    const d = currentData;
    if (!d) return [];
    return d.players.filter(p => {
      const matchTeam   = activeTeam === 'all' || p.team === activeTeam;
      const matchSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || (p.teamObj?.name||'').toLowerCase().includes(searchTerm);
      return matchTeam && matchSearch;
    });
  }

  function renderAll() {
    const d = currentData;
    if (!d) return;
    activeTeam = 'all';
    searchTerm = '';
    document.getElementById('player-search').value = '';

    // Banner
    document.getElementById('banner-sub').textContent = `${d.players.length} players · ${d.teams.length} teams`;
    const badge = document.getElementById('season-badge');
    badge.className = `season-badge ${d.status}`;
    badge.innerHTML = `<span class="dot"></span> ${d.status === 'ongoing' ? 'Ongoing' : 'Completed'} · OCC ${d.year}`;

    // Caps
    document.getElementById('caps-section').innerHTML = Render.capCards(d.orangeCap, d.purpleCap);

    // Team filter
    const filterBar = document.getElementById('filter-bar');
    // keep search box
    const searchBox = filterBar.querySelector('.search-box');
    filterBar.innerHTML = '';
    filterBar.appendChild(searchBox);

    const allBtn = document.createElement('button');
    allBtn.className = 'filter-pill active';
    allBtn.dataset.team = 'all';
    allBtn.textContent = 'All Teams';
    allBtn.addEventListener('click', () => setTeamFilter('all', allBtn, filterBar));
    filterBar.appendChild(allBtn);

    d.teams.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.dataset.team = t.id;
      btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color};margin-right:4px"></span>${t.short}`;
      btn.addEventListener('click', () => setTeamFilter(t.id, btn, filterBar));
      filterBar.appendChild(btn);
    });

    renderTables();
    renderCards();
    showTab(activeTab);
  }

  function setTeamFilter(teamId, btn, filterBar) {
    filterBar.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTeam = teamId;
    renderTables();
    renderCards();
  }

  function renderTables() {
    const players = filteredPlayers();
    document.getElementById('batting-section').innerHTML  = Render.battingTable(players);
    document.getElementById('bowling-section').innerHTML  = Render.bowlingTable(players);
    document.getElementById('fielding-section').innerHTML = Render.fieldingTable(players);
  }

  function renderCards() {
    const players = filteredPlayers();
    document.getElementById('player-cards').innerHTML = players.map(p => {
      const color = p.teamObj?.color || '#888';
      return `
        <div class="card" style="overflow:hidden;transition:all 0.2s">
          <div style="height:4px;background:${color}"></div>
          <div style="padding:1.1rem;display:flex;align-items:center;gap:0.85rem;border-bottom:1px solid var(--border)">
            <div style="width:40px;height:40px;border-radius:8px;background:${color};display:flex;align-items:center;justify-content:center;font-family:'Teko',sans-serif;font-size:1rem;font-weight:600;color:#fff;flex-shrink:0">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
            <div style="min-width:0">
              <div style="font-weight:600;font-size:0.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
              <div style="font-size:0.72rem;color:var(--text-2)">${p.teamObj?.name||p.team} · <span style="color:${color}">${p.role}</span></div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);text-align:center;gap:0">
            ${[
              {v: p.runs,     l: 'Runs'},
              {v: p.wickets,  l: 'Wkts'},
              {v: p.dismissals, l: 'Fielding'},
              {v: p.matches,  l: 'M'},
            ].map(({v,l}) => `
              <div style="padding:0.65rem 0.4rem;border-right:1px solid var(--border)">
                <div style="font-family:'Teko',sans-serif;font-size:1.2rem;color:var(--text);line-height:1">${v}</div>
                <div style="font-size:0.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-top:2px">${l}</div>
              </div>`).join('')}
          </div>
          <div style="padding:0.6rem 1rem;display:flex;gap:1.25rem;font-size:0.78rem;color:var(--text-2)">
            <span>Avg <strong style="color:var(--text)">${p.avg}</strong></span>
            <span>SR <strong style="color:var(--text)">${p.sr}</strong></span>
            ${p.economy ? `<span>Econ <strong style="color:var(--text)">${p.economy}</strong></span>` : ''}
          </div>
        </div>`;
    }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-2)">No players match your filter</div>`;
  }
})();
</script>
</body>
</html>
