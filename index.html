<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="11" y="8" width="2.5" height="18" rx="1.2" fill="white" opacity=".9"/>
        <rect x="16.75" y="5" width="2.5" height="21" rx="1.2" fill="white"/>
        <rect x="22.5" y="8" width="2.5" height="18" rx="1.2" fill="white" opacity=".9"/>
        <circle cx="28" cy="9" r="5.5" fill="#e8820c" opacity=".9"/>
        <circle cx="28" cy="9" r="3.2" fill="#f5a73b"/>
        <path d="M25 6Q27.5 3 31.5 5.5Q29 9 25.5 8.5Z" fill="#f97316" opacity=".8"/>
      </svg>
      <div class="nav-logo-text">OCC <em class="year-display nav-year">2025</em></div>
    </a>
    <div class="nav-links">
      <a class="nav-link" data-nav="home"     href="index.html">Home</a>
      <a class="nav-link" data-nav="schedule" href="schedule.html">Schedule</a>
      <a class="nav-link" data-nav="teams"    href="teams.html">Teams</a>
      <a class="nav-link" data-nav="points"   href="points.html">Standings</a>
      <a class="nav-link" data-nav="stats"    href="stats.html">Stats</a>
      <a class="nav-link" data-nav="awards"   href="awards.html">Awards</a>
    </div>
    <div class="nav-right">
      <select class="year-select"></select>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-left">
        <div class="hero-eyebrow">Season 2025 · Noida</div>
        <h1>O<em>C</em>C</h1>
        <p class="hero-sub">Siditya Cricket Ground · 16 Teams · 4 Groups</p>
        <div class="hero-actions">
          <a class="btn-primary" href="schedule.html">View Schedule</a>
          <a class="btn-outline" href="points.html">Standings</a>
        </div>
      </div>
      <div class="hero-right" id="hero-kpis">
        <!-- Populated by home.js -->
        <div class="hero-kpi">
          <div class="hero-kpi-val">—</div>
          <div class="hero-kpi-label">Top Scorer</div>
        </div>
        <div class="hero-kpi">
          <div class="hero-kpi-val">—</div>
          <div class="hero-kpi-label">Top Wickets</div>
        </div>
        <div class="hero-kpi">
          <div class="hero-kpi-val">—</div>
          <div class="hero-kpi-label">MVP Points</div>
        </div>
      </div>
    </div>
  </div>
  <div class="hero-divider"></div>

  <!-- CONTENT -->
  <div class="page-section active" data-page="home">
    <div class="container">

      <div class="section">
        <div id="home-champion"></div>
        <div class="section-header">
          <div class="section-title">Key Matches</div>
          <div class="section-badge" id="home-year-badge">2025</div>
        </div>
        <div class="grid-2" id="home-matches">
          <div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Tournament Leaders</div>
        </div>
        <div class="grid-4" id="home-stats"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Tournament Format</div>
        </div>
        <div class="format-flow" id="home-format"></div>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
