<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCC – Optum Cricket Championship</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy-dark: #0b1629;
  --navy:      #132040;
  --navy-mid:  #1a2d5a;
  --navy-card: #162038;
  --orange:    #e8820c;
  --orange-lt: #f5a73b;
  --orange-dim:#7a3e00;
  --white:     #ffffff;
  --muted:     #7a9ac8;
  --muted2:    #4a6a9a;
  --border:    rgba(255,255,255,0.07);
  --green:     #22c55e;
  --red:       #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--navy-dark);color:var(--white);min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(11,22,41,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo svg{width:34px;height:34px}
.nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--white);line-height:1}
.nav-logo-text span{color:var(--orange)}
.nav-links{display:flex;gap:2px}
.nav-link{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--white);background:rgba(255,255,255,0.06)}
.nav-link.active{color:var(--orange-lt);background:rgba(232,130,12,0.1)}
.nav-year-pill{display:flex;align-items:center;gap:6px}
.year-sel{background:var(--navy-card);border:1px solid rgba(232,130,12,0.3);color:var(--orange-lt);font-family:'DM Mono',monospace;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;outline:none}
.year-sel option{background:var(--navy-dark)}

/* ── PAGES ── */
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO ── */
.hero{background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy-mid) 55%,#0d2a4a 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 70% 40%,rgba(232,130,12,.07),transparent)}
.hero-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--orange-lt);text-transform:uppercase;margin-bottom:14px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,80px);line-height:.95;letter-spacing:2px;margin-bottom:12px}
.hero h1 em{color:var(--orange);font-style:normal}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:28px;letter-spacing:.5px}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-pri{background:var(--orange);color:#fff;padding:10px 24px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-pri:hover{background:var(--orange-lt)}
.btn-sec{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--white);padding:10px 24px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-sec:hover{background:rgba(255,255,255,0.12)}
.hero-rule{height:1px;background:linear-gradient(to right,transparent,var(--orange),transparent);margin:0}

/* ── CONTAINER ── */
.container{max-width:960px;margin:0 auto;padding:0 20px}

/* ── SECTION ── */
.section{padding:28px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--white)}
.section-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--orange-lt);background:rgba(232,130,12,0.12);padding:3px 8px;border-radius:4px;letter-spacing:1px}

/* ── CHAMPION BANNER ── */
.champion-banner{background:linear-gradient(135deg,rgba(232,130,12,.12),rgba(232,130,12,.04));border:1px solid rgba(232,130,12,.25);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--orange-lt)}
.champion-trophy{font-size:20px}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
@media(max-width:480px){.nav-links{display:none}}

/* ── CARDS ── */
.card{background:var(--navy-card);border:1px solid var(--border);border-radius:10px;padding:14px}
.card-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.stat-card{background:var(--navy-card);border:1px solid var(--border);border-radius:10px;padding:14px;border-left:2px solid var(--orange)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--orange-lt);line-height:1}
.stat-unit{font-size:12px;color:var(--muted);margin-left:2px}
.stat-player{font-size:13px;color:var(--white);margin-top:3px;font-weight:500}
.stat-team{font-size:11px;color:var(--muted)}

/* ── MATCH CARD ── */
.match-card{background:var(--navy-card);border:1px solid var(--border);border-radius:10px;padding:14px}
.match-status{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:10px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.5px}
.status-completed{color:var(--muted);background:rgba(255,255,255,0.05)}
.status-upcoming{color:var(--orange-lt);background:rgba(232,130,12,0.12)}
.status-live{color:var(--green);background:rgba(34,197,94,0.12)}
.match-teams{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.match-team-side{flex:1}
.match-team-side.right{text-align:right}
.match-team-name{font-size:12px;color:var(--muted);margin-bottom:3px}
.match-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);line-height:1}
.match-score.winner{color:var(--orange-lt)}
.match-overs{font-size:11px;color:var(--muted2)}
.match-vs{font-size:12px;color:var(--muted2);padding:0 4px;margin-top:8px}
.match-result{margin-top:10px;padding:6px 10px;background:rgba(34,197,94,0.08);border-radius:6px;font-size:11px;color:var(--green);border:1px solid rgba(34,197,94,0.15)}
.match-meta{margin-top:8px;font-size:11px;color:var(--muted2);border-top:1px solid var(--border);padding-top:8px}

/* ── TABLE ── */
.table-wrap{background:var(--navy-card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{padding:9px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;background:rgba(255,255,255,0.03);text-align:left;border-bottom:1px solid var(--border)}
.table-wrap th.r,.table-wrap td.r{text-align:right}
.table-wrap th.c,.table-wrap td.c{text-align:center}
.table-wrap td{padding:9px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,0.03)}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr.top-row td{background:rgba(232,130,12,0.06)}
.td-name{color:var(--white)!important;font-weight:500}
.td-pts{color:var(--orange-lt)!important;font-weight:600;font-family:'DM Mono',monospace}
.td-rank{font-family:'Bebas Neue',sans-serif;font-size:16px}
.td-rank.gold{color:var(--orange)}
.td-nrr-pos{color:#22c55e}
.td-nrr-neg{color:#ef4444}
.td-team-badge{display:inline-flex;align-items:center;gap:6px}
.team-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:8px;padding:3px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.tab.active{background:var(--navy-mid);color:var(--white);font-weight:500}

/* ── STAGE LABEL ── */
.stage-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--orange);margin:20px 0 10px;padding-left:2px}

/* ── AWARDS ── */
.award-card{background:var(--navy-card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden}
.award-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--orange),transparent)}
.award-icon{font-size:28px;margin-bottom:8px}
.award-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-family:'DM Mono',monospace}
.award-winner{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);margin-bottom:2px}
.award-detail{font-size:12px;color:var(--orange-lt)}
.award-team{font-size:11px;color:var(--muted);margin-top:2px}

/* ── PLAYER ROW ── */
.player-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.player-row:last-child{border-bottom:none}
.player-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted2);width:24px;flex-shrink:0}
.player-rank.p1{color:var(--orange)}
.player-info{flex:1}
.player-name{font-size:13px;font-weight:500;color:var(--white)}
.player-team{font-size:11px;color:var(--muted)}
.player-stat{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange-lt)}
.player-stat-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

/* ── FORMAT TIMELINE ── */
.format-timeline{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px}
.format-stage{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;flex-shrink:0;min-width:100px}
.format-stage-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--white)}
.format-stage-detail{font-size:10px;color:var(--muted);margin-top:2px}
.format-arrow{color:var(--orange);font-size:18px;padding:0 6px;flex-shrink:0}

/* ── MINI INFO ROW ── */
.info-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.info-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.info-chip span{color:var(--white);font-weight:500}

/* RESPONSIVE */
@media(max-width:640px){
  .hero{padding:40px 16px 32px}
  .hero h1{font-size:42px}
  .container{padding:0 14px}
  .grid-2{grid-template-columns:1fr 1fr}
}
</style>
</head>

<nav>

</nav>

<!-- ════════════════════════════ HOME PAGE ════════════════════════════ -->
<div id="page-home" class="page active">

    </div>
  </div>
</div>

<!-- ════════════════════════════ SCHEDULE PAGE ════════════════════════ -->
<div id="page-schedule" class="page">
  <div class="container">
    <div class="section">
      <div class="section-header">
        <div class="section-title">Schedule & Results</div>
        <div class="section-badge" id="schedule-badge">2025</div>
      </div>
      <div id="schedule-content"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════ TEAMS PAGE ══════════════════════════ -->
<div id="page-teams" class="page">

    <div class="section">
      <div class="section-header">
        <div class="section-title">Teams</div>
        <div class="section-badge" id="teams-badge">2025</div>
      </div>
      <div id="teams-content"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════ POINTS TABLE ════════════════════════ -->
<div id="page-points" class="page">

    <div class="section">
      <div class="section-header">
        <div class="section-title">Points Table</div>
        <div class="section-badge" id="points-badge">2025</div>
      </div>
      <div id="points-content"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════ STATS PAGE ══════════════════════════ -->
<div id="page-stats" class="page">
  <div class="container">
    <div class="section">
      <div class="section-header">
        <div class="section-title">Player Statistics</div>
        <div class="section-badge" id="stats-badge">2025</div>
      </div>
      <div class="tabs" id="stats-tabs">
        <button class="tab active" onclick="showStatTab('batting')">Batting</button>
        <button class="tab" onclick="showStatTab('bowling')">Bowling</button>
        <button class="tab" onclick="showStatTab('fielding')">Fielding</button>
        <button class="tab" onclick="showStatTab('mvp')">MVP</button>
      </div>
      <div id="stats-content"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════ AWARDS PAGE ═════════════════════════ -->
<div id="page-awards" class="page">
  <div class="container">
    <div class="section">
      <div class="section-header">
        <div class="section-title">Awards & Hall of Fame</div>
        <div class="section-badge" id="awards-badge">2025</div>
      </div>
      <div id="awards-content"></div>
    </div>
  </div>
</div>

let currentYear = '2025';
let currentStatTab = 'batting';

const teamColors = [
  '#e8820c','#22c55e','#3b82f6','#a855f7','#ef4444',
  '#06b6d4','#f59e0b','#ec4899','#10b981','#6366f1',
  '#f97316','#14b8a6','#8b5cf6','#84cc16','#0ea5e9','#f43f5e'
];
const teamColorMap = {};
function getTeamColor(name) {
  if (!teamColorMap[name]) {
    const keys = Object.keys(teamColorMap);
    teamColorMap[name] = teamColors[keys.length % teamColors.length];
  }
  return teamColorMap[name];
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const links = document.querySelectorAll('.nav-link');
  const pageMap = { home:0, schedule:1, teams:2, points:3, stats:4, awards:5 };
  if (pageMap[page] !== undefined) links[pageMap[page]].classList.add('active');
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setYear(year) {
  currentYear = year;
  document.getElementById('nav-year-display').textContent = year;
  const d = DATA[year];
  document.getElementById('hero-badge').textContent = d.season;
  document.getElementById('hero-sub').textContent = d.tagline;
  ['home-year-badge','schedule-badge','teams-badge','points-badge','stats-badge','awards-badge']
    .forEach(id => { const el = document.getElementById(id); if(el) el.textContent = year; });
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    const pageId = activePage.id.replace('page-', '');
    renderPage(pageId);
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER DISPATCHER
// ══════════════════════════════════════════════════════════════
function renderPage(page) {
  const d = DATA[currentYear];
  if (page === 'home')     renderHome(d);
  if (page === 'schedule') renderSchedule(d);
  if (page === 'teams')    renderTeams(d);
  if (page === 'points')   renderPoints(d);
  if (page === 'stats')    renderStats(d);
  if (page === 'awards')   renderAwards(d);
}

  document.getElementById('home-champion').innerHTML = d.champion ? `
    <div class="champion-banner">
      <span class="champion-trophy">🏆</span>
      <div><strong>${d.champion}</strong> — ${currentYear} OCC Champions</div>
    </div>` : '';

  // Key matches
  const f = d.final;
  let matchesHTML = `
    <div class="match-card">
      <div class="match-status status-completed">Final</div>
      <div class="match-teams">
        <div class="match-team-side">
          <div class="match-team-name">${f.t1}</div>
          <div class="match-score winner">${f.s1}</div>
          <div class="match-overs">${f.o1 || ''}</div>
        </div>
        <div class="match-vs">vs</div>
        <div class="match-team-side right">
          <div class="match-team-name">${f.t2}</div>
          <div class="match-score">${f.s2}</div>
          <div class="match-overs">${f.o2 || ''}</div>
        </div>
      </div>
      <div class="match-result">${f.result}</div>
      <div class="match-meta">${f.date} · Siditya Cricket Ground</div>
    </div>`;

  const sf = d.knockout.find(k => k.stage.includes('Semi Final 1')) || d.knockout[0];
  matchesHTML += `
    <div class="match-card">
      <div class="match-status status-completed">${sf.stage}</div>
      <div class="match-teams">
        <div class="match-team-side">
          <div class="match-team-name">${sf.t1}</div>
          <div class="match-score ${sf.result.startsWith(sf.t1)?'winner':''}">${sf.s1||'—'}</div>
          <div class="match-overs">${sf.o1||''}</div>
        </div>
        <div class="match-vs">vs</div>
        <div class="match-team-side right">
          <div class="match-team-name">${sf.t2}</div>
          <div class="match-score ${sf.result.startsWith(sf.t2)?'winner':''}">${sf.s2||'—'}</div>
          <div class="match-overs">${sf.o2||''}</div>
        </div>
      </div>
      <div class="match-result">${sf.result}</div>
      ${sf.date?`<div class="match-meta">${sf.date}</div>`:''}
    </div>`;
  document.getElementById('home-matches').innerHTML = matchesHTML;

  // Stats
  const b = d.batting[0], bw = d.bowling[0], mvp = d.mvp[0];
  document.getElementById('home-stats').innerHTML = `
    <div class="stat-card">
      <div class="card-label">Top Scorer</div>
      <div><span class="stat-val">${b.runs}</span><span class="stat-unit">runs</span></div>
      <div class="stat-player">${b.name}</div>
      <div class="stat-team">${b.team}</div>
    </div>
    <div class="stat-card">
      <div class="card-label">Top Wickets</div>
      <div><span class="stat-val">${bw.wkts}</span><span class="stat-unit">wkts</span></div>
      <div class="stat-player">${bw.name}</div>
      <div class="stat-team">${bw.team}</div>
    </div>
    <div class="stat-card">
      <div class="card-label">Best Economy</div>
      <div><span class="stat-val">${d.bowling.slice().sort((a,b)=>a.eco-b.eco)[0].eco}</span><span class="stat-unit">eco</span></div>
      <div class="stat-player">${d.bowling.slice().sort((a,b)=>a.eco-b.eco)[0].name}</div>
      <div class="stat-team">${d.bowling.slice().sort((a,b)=>a.eco-b.eco)[0].team}</div>
    </div>
    <div class="stat-card">
      <div class="card-label">Tournament MVP</div>
      <div><span class="stat-val">${mvp.pts}</span><span class="stat-unit">pts</span></div>
      <div class="stat-player">${mvp.name}</div>
      <div class="stat-team">${mvp.team}</div>
    </div>`;

  // Format
  let fmtHTML = '';
  d.format.forEach((s,i) => {
    fmtHTML += `<div class="format-stage"><div class="format-stage-name">${s.name}</div><div class="format-stage-detail">${s.detail}</div></div>`;
    if (i < d.format.length-1) fmtHTML += `<div class="format-arrow">→</div>`;
  });
  document.getElementById('home-format').innerHTML = fmtHTML;
}

// ══════════════════════════════════════════════════════════════
// SCHEDULE
// ══════════════════════════════════════════════════════════════
function renderSchedule(d) {
  let html = '';

  // Knockout matches
  html += `<div class="stage-label">Knockout Stages</div><div class="grid-2">`;
  d.knockout.slice().reverse().forEach(m => {
    const w = m.result ? m.result.split(' ')[0] + ' ' + m.result.split(' ')[1] : '';
    html += `
      <div class="match-card">
        <div class="match-status status-completed">${m.stage}</div>
        <div class="match-teams">
          <div class="match-team-side">
            <div class="match-team-name">${m.t1}</div>
            <div class="match-score ${m.result&&m.result.startsWith(m.t1)?'winner':''}">${m.s1||'TBD'}</div>
            <div class="match-overs">${m.o1||''}</div>
          </div>
          <div class="match-vs">vs</div>
          <div class="match-team-side right">
            <div class="match-team-name">${m.t2}</div>
            <div class="match-score ${m.result&&m.result.startsWith(m.t2)?'winner':''}">${m.s2||'TBD'}</div>
            <div class="match-overs">${m.o2||''}</div>
          </div>
        </div>
        ${m.result?`<div class="match-result">${m.result}</div>`:''}
        ${m.date?`<div class="match-meta">${m.date} · Siditya Cricket Ground, Noida</div>`:''}
      </div>`;
  });
  html += `</div>`;

  // Super stage
  const stageLabel = currentYear === '2025' ? 'Super Eight' : 'Super Six';
  html += `<div class="stage-label" style="margin-top:24px">${stageLabel}</div>`;
  d.superEight.forEach(grp => {
    html += `<div class="card-label" style="margin:12px 0 6px">${grp.name}</div>`;
    html += renderGroupTable(grp.teams);
  });

  // League groups
  html += `<div class="stage-label" style="margin-top:24px">League Stage</div>`;
  d.groups.forEach(grp => {
    html += `<div class="card-label" style="margin:12px 0 6px">Group ${grp.name}</div>`;
    html += renderGroupTable(grp.teams);
  });

  document.getElementById('schedule-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// TEAMS
// ══════════════════════════════════════════════════════════════
function renderTeams(d) {
  let html = `<div class="info-row" style="margin-bottom:16px">
    <div class="info-chip">Total teams: <span>${d.teams.length}</span></div>
    <div class="info-chip">Season: <span>${currentYear}</span></div>
    <div class="info-chip">Venue: <span>Siditya Cricket Ground, Noida</span></div>
  </div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">`;
  d.teams.forEach(name => {
    const col = getTeamColor(name);
    html += `
      <div class="card" style="border-left:2px solid ${col};cursor:default">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:${col}22;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:${col}">
            ${name.split(' ').map(w=>w[0]).slice(0,2).join('')}
          </div>
          <div style="font-size:12px;font-weight:500;color:var(--white);line-height:1.3">${name}</div>
        </div>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('teams-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// POINTS TABLE
// ══════════════════════════════════════════════════════════════
function renderPoints(d) {
  let html = '';

  if (d.champion) {
    html += `<div class="champion-banner">
      <span class="champion-trophy">🏆</span>
      <div><strong>${d.champion}</strong> — ${currentYear} OCC Champions</div>
    </div>`;
  }

  const stageLabel = currentYear === '2025' ? 'Super Eight' : 'Super Six';
  html += `<div class="stage-label">${stageLabel}</div>`;
  d.superEight.forEach(grp => {
    html += `<div class="card-label" style="margin:12px 0 6px">${grp.name}</div>`;
    html += renderGroupTable(grp.teams);
  });

  html += `<div class="stage-label" style="margin-top:24px">League Stage</div>`;
  d.groups.forEach(grp => {
    html += `<div class="card-label" style="margin:12px 0 6px">Group ${grp.name}</div>`;
    html += renderGroupTable(grp.teams);
  });

  document.getElementById('points-content').innerHTML = html;
}

function renderGroupTable(teams) {
  let html = `<div class="table-wrap" style="margin-bottom:4px">
    <table><thead><tr>
      <th style="width:28px">#</th>
      <th>Team</th>
      <th class="c">M</th><th class="c">W</th><th class="c">L</th>
      <th class="r">NRR</th><th class="r">Pts</th>
    </tr></thead><tbody>`;
  teams.forEach(t => {
    const nrrClass = parseFloat(t.nrr) >= 0 ? 'td-nrr-pos' : 'td-nrr-neg';
    const col = getTeamColor(t.name);
    html += `<tr class="${t.pos===1?'top-row':''}">
      <td class="td-rank ${t.pos===1?'gold':''}">${t.pos}</td>
      <td class="td-name">
        <div class="td-team-badge">
          <div class="team-dot" style="background:${col}"></div>
          ${t.name}${t.tie?' <span style="font-size:9px;color:var(--muted)">(T)</span>':''}
        </div>
      </td>
      <td class="c">${t.m}</td><td class="c">${t.w}</td><td class="c">${t.l}</td>
      <td class="r ${nrrClass}">${t.nrr}</td>
      <td class="td-pts r">${t.pts}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

// ══════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════
function showStatTab(tab) {
  currentStatTab = tab;
  document.querySelectorAll('#stats-tabs .tab').forEach(t => t.classList.remove('active'));
  const tabMap = { batting:0, bowling:1, fielding:2, mvp:3 };
  document.querySelectorAll('#stats-tabs .tab')[tabMap[tab]].classList.add('active');
  renderStats(DATA[currentYear]);
}

function renderStats(d) {
  let html = '';
  if (currentStatTab === 'batting') {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Player</th><th>Team</th>
        <th class="r">Runs</th><th class="r">HS</th><th class="r">Avg</th><th class="r">SR</th>
        <th class="c">50s</th><th class="c">100s</th>
      </tr></thead><tbody>`;
    d.batting.forEach((p,i) => {
      html += `<tr class="${i===0?'top-row':''}">
        <td class="td-rank ${i===0?'gold':''}">${i+1}</td>
        <td class="td-name">${p.name}</td>
        <td><div class="td-team-badge"><div class="team-dot" style="background:${getTeamColor(p.team)}"></div>${p.team}</div></td>
        <td class="r td-pts">${p.runs}</td>
        <td class="r">${p.hs}</td>
        <td class="r">${p.avg}</td>
        <td class="r">${p.sr}</td>
        <td class="c">${p['50s']}</td>
        <td class="c">${p['100s']}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

  } else if (currentStatTab === 'bowling') {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Player</th><th>Team</th>
        <th class="r">Wkts</th><th class="r">Best</th><th class="r">Avg</th><th class="r">Eco</th><th class="r">SR</th>
      </tr></thead><tbody>`;
    d.bowling.forEach((p,i) => {
      html += `<tr class="${i===0?'top-row':''}">
        <td class="td-rank ${i===0?'gold':''}">${i+1}</td>
        <td class="td-name">${p.name}</td>
        <td><div class="td-team-badge"><div class="team-dot" style="background:${getTeamColor(p.team)}"></div>${p.team}</div></td>
        <td class="r td-pts">${p.wkts}</td>
        <td class="r">${p.best}</td>
        <td class="r">${p.avg}</td>
        <td class="r">${p.eco}</td>
        <td class="r">${p.sr}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

  } else if (currentStatTab === 'fielding') {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Player</th><th>Team</th>
        <th class="r">Dismissals</th><th class="r">Catches</th><th class="r">Stumpings</th>
      </tr></thead><tbody>`;
    d.fielding.forEach((p,i) => {
      html += `<tr class="${i===0?'top-row':''}">
        <td class="td-rank ${i===0?'gold':''}">${i+1}</td>
        <td class="td-name">${p.name}</td>
        <td><div class="td-team-badge"><div class="team-dot" style="background:${getTeamColor(p.team)}"></div>${p.team}</div></td>
        <td class="r td-pts">${p.dismissals}</td>
        <td class="r">${p.catches}</td>
        <td class="r">${p.stumpings}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

  } else if (currentStatTab === 'mvp') {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Player</th><th>Team</th><th>Role</th>
        <th class="r">MVP Pts</th>
      </tr></thead><tbody>`;
    d.mvp.forEach((p,i) => {
      html += `<tr class="${i===0?'top-row':''}">
        <td class="td-rank ${i===0?'gold':''}">${i+1}</td>
        <td class="td-name">${p.name}</td>
        <td><div class="td-team-badge"><div class="team-dot" style="background:${getTeamColor(p.team)}"></div>${p.team}</div></td>
        <td style="color:var(--muted);font-size:11px">${p.role}</td>
        <td class="r td-pts">${p.pts}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  document.getElementById('stats-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// AWARDS
// ══════════════════════════════════════════════════════════════
function renderAwards(d) {
  let html = ``;
  if (d.champion) {
    html += `<div class="champion-banner" style="margin-bottom:20px">
      <span class="champion-trophy">🏆</span>
      <div><strong>${d.champion}</strong> — ${currentYear} OCC Champions · Siditya Cricket Ground, Noida</div>
    </div>`;
  }

  html += `<div class="grid-3" style="margin-bottom:20px">`;
  d.awards.forEach(a => {
    html += `
      <div class="award-card">
        <div class="award-icon">${a.icon}</div>
        <div class="award-title">${a.title}</div>
        <div class="award-winner">${a.winner}</div>
        <div class="award-detail">${a.detail}</div>
        ${a.team ? `<div class="award-team">${a.team}</div>` : ''}
      </div>`;
  });
  html += `</div>`;

  // Year comparison
  html += `<div class="section-header" style="margin-top:8px"><div class="section-title">All-time Champions</div></div>`;
  html += `<div class="table-wrap"><table>
    <thead><tr>
      <th>Year</th><th>Champions</th><th>Runners Up</th><th>3rd Place</th><th>Top Scorer</th><th>Top Bowler</th>
    </tr></thead><tbody>`;

  Object.keys(DATA).sort((a,b)=>b-a).forEach(yr => {
    const yd = DATA[yr];
    html += `<tr>
      <td class="td-pts">${yr}</td>
      <td class="td-name">🏆 ${yd.champion}</td>
      <td style="color:var(--muted)">${yd.knockout?.find(k=>k.stage==='Final')?.t2 || '—'}</td>
      <td style="color:var(--muted)">${yd.knockout?.find(k=>k.stage==='3rd Place')?.t1 || '—'}</td>
      <td style="color:var(--muted)">${yd.batting[0].name} (${yd.batting[0].runs})</td>
      <td style="color:var(--muted)">${yd.bowling[0].name} (${yd.bowling[0].wkts} wkts)</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  document.getElementById('awards-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
// Pre-assign team colors deterministically
Object.values(DATA).forEach(d => d.teams.forEach(t => getTeamColor(t)));
renderHome(DATA['2025']);
</script>
